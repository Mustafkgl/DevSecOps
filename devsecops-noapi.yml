name: DevSecOps (no API, no 3rd-party actions)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write   # raporları repo'ya commitlemek için
  packages: read    # gerekmez ama dursun (push yok)
  # security-events WRITE yok: REST API kullanmıyoruz

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${GITHUB_SHA}
      REPORT_DIR: security-reports/${{ github.sha }}
      QUALITY_GATE: high           # none|low|medium|high|critical (eşik)
      COMMIT_REPORTS_ON_NONPR: "true"

    steps:
      # 1) Reposuz başla, KENDİN git fetch yap
      - name: Fetch repository (no checkout action)
        shell: bash
        run: |
          set -euxo pipefail
          git init .
          git config --global init.defaultBranch main
          git config --global advice.detachedHead false