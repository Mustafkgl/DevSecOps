name: DevSecOps (no API, no 3rd-party actions)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write   # raporları repo'ya commitlemek için
  packages: read    # gerekmez ama dursun (push yok)
  # security-events WRITE yok: REST API kullanmıyoruz

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${GITHUB_SHA}
      REPORT_DIR: security-reports/${{ github.sha }}
      QUALITY_GATE: high           # none|low|medium|high|critical (eşik)
      COMMIT_REPORTS_ON_NONPR: "true"

    steps:
      # 1) Reposuz başla, KENDİN git fetch yap
      - name: Fetch repository (no checkout action)
        shell: bash
        run: |
          set -euxo pipefail
          git init .
          git config --global init.defaultBranch main
          git config --global advice.detachedHead false
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # PR ise kaynağı al, değilse SHA'yi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin "pull/${{ github.event.number }}/head:pr-${{ github.event.number }}"
            git checkout "pr-${{ github.event.number }}"
          else
            git fetch --depth=1 origin "${GITHUB_SHA}"
            git checkout "${GITHUB_SHA}"
          fi
          git status

      # 2) Docker build (lokal; push yok)
      - name: Build Docker image (local only)
        shell: bash
        run: |
          set -euxo pipefail
          docker version
          docker build -t juice-shop:${{ env.IMAGE_TAG }} .

      # 3) Syft kur ve SBOM üret (image + source)
      - name: Install Syft
        shell: bash
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOMs (CycloneDX)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p sbom
          syft "juice-shop:${{ env.IMAGE_TAG }}" -o cyclonedx-json > sbom/sbom-image-cyclonedx.json
          syft dir:. -o cyclonedx-json > sbom/sbom-source-cyclonedx.json
          echo "✅ SBOM dosyaları: sbom/sbom-image-cyclonedx.json, sbom/sbom-source-cyclonedx.json"

      # 4) Grype kur ve zafiyet tara (JSON + SARIF üret)
      - name: Install Grype
        shell: bash
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Vulnerability scan (JSON + SARIF)
        shell: bash
        continue-on-error: true   # rapor çıkabilsin; kalite kapısı bir sonraki adımda karar verir
        run: |
          set -euxo pipefail
          mkdir -p results
          # JSON ve SARIF çıktıları üret
          grype "juice-shop:${{ env.IMAGE_TAG }}" -o json  > results/grype.json
          grype "juice-shop:${{ env.IMAGE_TAG }}" -o sarif > results/grype.sarif
          # kısa özet
          command -v jq >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y jq; }
          echo "---- Severity sayımı (JSON) ----"
          jq -r '.matches[].vulnerability.severity' results/grype.json | sort | uniq -c | sed 's/^/  /'
          echo "--------------------------------"

      # 5) Kalite kapısı (API yok; kendi jq kuralımız)
      - name: Quality gate (fail on $QUALITY_GATE or above)
        shell: bash
        run: |
          set -euxo pipefail
          command -v jq >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y jq; }

          THRESHOLD="${QUALITY_GATE}"
          # severity sırası: negligible<low<medium<high<critical
          order() {
            case "$1" in
              negligible) echo 0 ;;
              low)        echo 1 ;;
              medium)     echo 2 ;;
              high)       echo 3 ;;
              critical)   echo 4 ;;
              *)          echo -1 ;;
            esac
          }

          THRESH=$(order "$THRESHOLD")
          # JSON içinden yüksek ya da eşik üzeri severity say
          COUNT=$(jq -r '.matches[].vulnerability.severity' results/grype.json \
            | awk -v T="$THRESH" '
              function ord(s){ if(s=="negligible")return 0; if(s=="low")return 1; if(s=="medium")return 2; if(s=="high")return 3; if(s=="critical")return 4; return -1 }
              { if (ord(tolower($0)) >= T) c++ } END{ print c+0 }')

          echo "Eşik: ${THRESHOLD} ve üzeri bulgu sayısı: ${COUNT}" | tee -a $GITHUB_STEP_SUMMARY
          if [ "$COUNT" -gt 0 ]; then
            echo "⚠️  ${COUNT} adet ${THRESHOLD}+ zafiyet bulundu." | tee -a $GITHUB_STEP_SUMMARY
            # İstersen kır: exit 1
            # şimdilik uyarı bırakıyoruz; sertleştirmek için aşağıdaki satırı aç
            # exit 1
          else